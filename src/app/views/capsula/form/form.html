<form [formGroup]="capsulaForm" (ngSubmit)="enviar()">
    <section>
        <mat-form-field class="example-full-width">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="nome" placeholder="Ex. João Silva" required />
        </mat-form-field>

        <mat-form-field>
            <mat-label>Choose a date</mat-label>
            <input matInput formControlName="dataExpiracao" [matDatepicker]="picker" />
            <mat-hint>DD/MM/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
    </section>

    <section>
        <button mat-raised-button color="accent" type="button" (click)="voltar()">Voltar</button>
        @if (mode.toString() !== 'view') {
        	<button mat-raised-button color="primary" type="submit">Salvar</button>
        }
    </section>
</form>
