<div>
    <mat-form-field subscriptSizing="dynamic" appearance="fill">
        <mat-label>Filtro</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Capsula 2" #input />
    </mat-form-field>
    <button matFab extended (click)="novaCapsula()">
        <mat-icon>add_circle</mat-icon>
        Nova Cápsula
    </button>
</div>

<div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource">
        <!-- Position Column -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let element">{{element.id | limit: 8 : false}}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let element">{{element.nome}}</td>
        </ng-container>

        <!-- Qtd Mensagens Column -->
        <ng-container matColumnDef="qtdMensagens">
            <th mat-header-cell *matHeaderCellDef>No. de Mensagens</th>
            <td mat-cell *matCellDef="let element">{{element.qtdMensagens}}</td>
        </ng-container>

        <!-- Weight Column -->
        <ng-container matColumnDef="dataCriacao">
            <th mat-header-cell *matHeaderCellDef>Data de Criação</th>
            <td mat-cell *matCellDef="let element">{{element.dataCriacao | date :'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="dataExpiracao">
            <th mat-header-cell *matHeaderCellDef>Data de Expiração</th>
            <td mat-cell *matCellDef="let element">{{element.dataExpiracao | date :'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let element">
                <button matIconButton [ariaLabel]="'Excluir capsula de ID ' + element.id" (click)="deleteCapsula(element.id)">
                    <mat-icon>delete</mat-icon>
                </button>
                <button matIconButton [ariaLabel]="'Editar capsula de ID ' + element.id" (click)="editCapsula(element.id)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button matIconButton [ariaLabel]="'Visualizar capsula de ID ' + element.id" (click)="viewCapsula(element.id)">
                    <mat-icon>visibility</mat-icon>
                </button>
                <button matIconButton [ariaLabel]="'Ver mensagens capsula de ID ' + element.id" (click)="viewMessagesCapsula(element.id)">
                    <mat-icon>forum</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons aria-label="Selecione a página de elementos periódicos"> </mat-paginator>
</div>
