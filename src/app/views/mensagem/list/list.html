<div>
    <mat-form-field subscriptSizing="dynamic" appearance="fill">
        <mat-label>Filtro</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mensagem 1" #input />
    </mat-form-field>

    <button matFab extended (click)="novaMensagem()">
        <mat-icon>add_comment</mat-icon>
        Nova Mensagem
    </button>
</div>

<div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource">
        <!-- Position Column -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>ID</th>
            <td mat-cell *matCellDef="let element">{{element.id | limit: 8 : false}}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="nomeCriador">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let element">{{element.nomeCriador}}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="emailCriador">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let element">{{element.emailCriador}}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="enviada">
            <th mat-header-cell *matHeaderCellDef>Enviada</th>
            <td mat-cell *matCellDef="let element">{{element.enviada ? 'Sim' : 'Não'}}</td>
        </ng-container>

        <!-- Weight Column -->
        <ng-container matColumnDef="dataCriacao">
            <th mat-header-cell *matHeaderCellDef>Data de Criação</th>
            <td mat-cell *matCellDef="let element">{{element.dataCriacao | date :'dd/MM/yyyy' }}</td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let element">
                <button matIconButton [ariaLabel]="'Excluir capsula de ID ' + element.id" (click)="deleteMensagem(element.id)">
                    <mat-icon>delete</mat-icon>
                </button>
                <button matIconButton [ariaLabel]="'Editar capsula de ID ' + element.id" (click)="editMensagem(element.id)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button matIconButton [ariaLabel]="'Visualizar capsula de ID ' + element.id" (click)="viewMensagem(element.id)">
                    <mat-icon>visibility</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons aria-label="Selecione a página de elementos periódicos"> </mat-paginator>

    <section>
        <button mat-raised-button color="accent" type="button" (click)="voltar()">Voltar</button>
    </section>
</div>
